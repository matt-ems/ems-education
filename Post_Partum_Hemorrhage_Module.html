<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPH — Interactive Learning Module</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f0f; }
#root { max-width: 800px; margin: 0 auto; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SECTIONS = [
  "dispatch",
  "whyCare",
  "anatomy",
  "fourTs",
  "blsManagement",
  "alsOxytocin",
  "decisionTool",
  "scenarios",
  "summary",
];

const SECTION_LABELS = {
  dispatch: "The Call",
  whyCare: "Why This Matters",
  anatomy: "Quick A&P Review",
  fourTs: 'The 4 T\'s',
  blsManagement: "BLS Management",
  alsOxytocin: "ALS: Oxytocin",
  decisionTool: "Decision Flowchart",
  scenarios: "Clinical Scenarios",
  summary: "Summary Card",
};

const C = {
  bg: "#0f0f0f",
  surface: "#1a1a1a",
  surfaceLight: "#222222",
  surfaceHover: "#2a2a2a",
  border: "rgba(255,255,255,0.08)",
  borderLight: "rgba(255,255,255,0.12)",
  text: "#e8e8e8",
  textMuted: "#9ca3af",
  textDim: "#6b7280",
  accent: "#e74c3c",
  accentGlow: "rgba(231,76,60,0.15)",
  green: "#27ae60",
  greenGlow: "rgba(39,174,96,0.12)",
  orange: "#f39c12",
  purple: "#9b59b6",
  blue: "#2980b9",
};

function Quiz({ questions }) {
  const [revealed, setRevealed] = useState({});
  const select = (qi, ai) => {
    if (revealed[qi] !== undefined) return;
    setRevealed((r) => ({ ...r, [qi]: ai }));
  };
  return (
    <div style={{ marginTop: 28 }}>
      <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: 2, textTransform: "uppercase", color: C.accent, marginBottom: 14, fontWeight: 600 }}>
        ✦ Knowledge Check
      </div>
      {questions.map((q, qi) => {
        const chosenAnswer = revealed[qi];
        const isRevealed = chosenAnswer !== undefined;
        const isCorrect = chosenAnswer === q.correct;
        return (
          <div key={qi} style={{ marginBottom: 24, padding: "18px 20px", background: isRevealed ? isCorrect ? "rgba(39,174,96,0.08)" : "rgba(231,76,60,0.08)" : C.surface, borderRadius: 10, border: isRevealed ? isCorrect ? "1px solid rgba(39,174,96,0.3)" : "1px solid rgba(231,76,60,0.3)" : `1px solid ${C.border}`, transition: "all 0.3s ease" }}>
            <div style={{ fontWeight: 600, fontSize: 15, marginBottom: 12, color: C.text, lineHeight: 1.5 }}>{q.stem}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {q.options.map((opt, ai) => {
                const isRight = ai === q.correct;
                const wasChosen = chosenAnswer === ai;
                let bg = "transparent";
                let border = `1.5px solid ${C.border}`;
                let icon = null;
                let textColor = C.text;
                if (isRevealed) {
                  if (isRight) { bg = "rgba(39,174,96,0.12)"; border = "1.5px solid #27ae60"; icon = "✓"; }
                  else if (wasChosen && !isRight) { bg = "rgba(231,76,60,0.12)"; border = "1.5px solid #e74c3c"; icon = "✗"; }
                  else { textColor = C.textDim; }
                }
                return (
                  <button key={ai} onClick={() => select(qi, ai)} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", background: bg, border, borderRadius: 8, cursor: isRevealed ? "default" : "pointer", textAlign: "left", fontSize: 14, lineHeight: 1.45, color: textColor, fontFamily: "inherit", transition: "all 0.2s ease" }}>
                    {icon && <span style={{ fontWeight: 700, fontSize: 16, color: isRight ? C.green : C.accent, width: 20, flexShrink: 0 }}>{icon}</span>}
                    {opt}
                  </button>
                );
              })}
            </div>
            {isRevealed && (
              <div style={{ marginTop: 12, padding: "10px 14px", background: "rgba(255,255,255,0.03)", borderRadius: 6, fontSize: 13, lineHeight: 1.55, color: C.textMuted, borderLeft: `3px solid ${isCorrect ? C.green : C.accent}` }}>{q.rationale}</div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function Expand({ title, children, color = C.accent }) {
  const [open, setOpen] = useState(false);
  return (
    <div style={{ marginBottom: 10, border: `1px solid ${open ? color + "44" : C.border}`, borderRadius: 10, overflow: "hidden", transition: "all 0.3s ease" }}>
      <button onClick={() => setOpen(!open)} style={{ width: "100%", display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px", background: open ? color + "12" : "transparent", border: "none", cursor: "pointer", fontSize: 15, fontWeight: 600, color: C.text, textAlign: "left", fontFamily: "inherit", lineHeight: 1.4 }}>
        <span>{title}</span>
        <span style={{ transform: open ? "rotate(180deg)" : "rotate(0)", transition: "transform 0.25s ease", fontSize: 18, color: color, flexShrink: 0, marginLeft: 10 }}>▾</span>
      </button>
      {open && <div style={{ padding: "4px 18px 18px", fontSize: 14, lineHeight: 1.65, color: C.textMuted }}>{children}</div>}
    </div>
  );
}

function Callout({ type = "info", children }) {
  const styles = {
    pcs: { bg: "rgba(41,128,185,0.08)", border: C.blue, icon: "📋", label: "Ontario PCS" },
    warning: { bg: "rgba(231,76,60,0.08)", border: C.accent, icon: "⚠️", label: "Critical" },
    tip: { bg: "rgba(39,174,96,0.08)", border: C.green, icon: "💡", label: "Clinical Pearl" },
    myth: { bg: "rgba(155,89,182,0.08)", border: C.purple, icon: "🔍", label: "Myth Buster" },
    acp: { bg: "rgba(243,156,18,0.08)", border: C.orange, icon: "🔶", label: "ACP Scope" },
    info: { bg: "rgba(255,255,255,0.04)", border: "#6b7280", icon: "ℹ️", label: "Note" },
  };
  const s = styles[type] || styles.info;
  return (
    <div style={{ padding: "14px 16px", background: s.bg, borderLeft: `4px solid ${s.border}`, borderRadius: "0 8px 8px 0", marginBottom: 14, fontSize: 14, lineHeight: 1.6, color: C.textMuted }}>
      <div style={{ fontWeight: 700, fontSize: 11, letterSpacing: 1.5, textTransform: "uppercase", color: s.border, marginBottom: 6 }}>{s.icon} {s.label}</div>
      {children}
    </div>
  );
}

function DispatchSection() {
  const [revealed, setRevealed] = useState(false);
  return (
    <div>
      <div style={{ background: C.surfaceLight, color: C.text, padding: "28px 24px", borderRadius: 12, marginBottom: 20, fontFamily: "'DM Mono', monospace", fontSize: 14, lineHeight: 1.7, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 11, letterSpacing: 3, color: C.textDim, marginBottom: 10 }}>DISPATCH ▸ 0247h</div>
        <p style={{ margin: 0 }}><strong style={{ color: C.accent }}>Code 4</strong> — 28-year-old female, postpartum, heavy vaginal bleeding. Unplanned home delivery approximately 40 minutes ago, no midwife present. Partner on the line states "blood everywhere, she's getting pale."</p>
      </div>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: C.text, marginBottom: 16 }}><strong>Before you scroll further</strong> — take 10 seconds and think:</p>
      <ul style={{ fontSize: 14, lineHeight: 1.8, color: C.textMuted, paddingLeft: 20 }}>
        <li>What equipment are you grabbing before you walk in the door?</li>
        <li>What are the most likely causes of this bleeding?</li>
        <li>What's your single most important intervention?</li>
      </ul>
      {!revealed ? (
        <button onClick={() => setRevealed(true)} style={{ marginTop: 16, padding: "12px 28px", background: C.accent, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 600, fontFamily: "inherit" }}>I've thought about it — show me the module →</button>
      ) : (
        <Callout type="tip"><strong>Grab before you go in:</strong> OBS kit, IV supplies, oxytocin, towels/blankets. Start thinking about the 4 T's before you even walk in the door — the cause shapes your management.</Callout>
      )}
    </div>
  );
}

function WhyCareSection() {
  return (
    <div>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: C.text }}>Postpartum hemorrhage (PPH) is the <strong>leading cause of maternal death worldwide</strong>. In Ontario, prehospital births are relatively uncommon — which makes them a classic <strong>high-acuity, low-occurrence (HALO)</strong> call. When it goes sideways, it goes fast.</p>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(180px, 1fr))", gap: 12, margin: "20px 0" }}>
        {[{ num: "500 mL", label: "Traditional PPH threshold (vaginal delivery)" }, { num: "~800 mL", label: "Blood loss often visually underestimated by 30-50%" }, { num: "#1", label: "Cause of PPH: Uterine atony (the 'T' you can treat)" }].map((d, i) => (
          <div key={i} style={{ textAlign: "center", padding: "18px 14px", background: C.accentGlow, borderRadius: 10, border: "1px solid rgba(231,76,60,0.2)" }}>
            <div style={{ fontSize: 28, fontWeight: 800, color: C.accent, fontFamily: "'DM Mono', monospace" }}>{d.num}</div>
            <div style={{ fontSize: 12, color: C.textDim, marginTop: 6, lineHeight: 1.4 }}>{d.label}</div>
          </div>
        ))}
      </div>
      <Callout type="myth"><strong>Myth:</strong> "If the bleeding looks manageable, we have time."<br /><strong>Reality:</strong> Healthy pregnant patients compensate exceptionally well — vitals can look reassuringly normal while losing significant volume. By the time the BP drops, you're already behind. Treat the bleeding, not the numbers.</Callout>
      <Callout type="tip">Visual estimation of blood loss is notoriously inaccurate. Ask about duration of bleeding, rate of flow, and number of pads/towels soaked. Use quantitative cues from the BLS PCS.</Callout>
    </div>
  );
}

function AnatomySection() {
  return (
    <div>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: C.text }}>You don't need a textbook review — you need to understand <strong>one concept</strong> that drives almost everything in PPH management:</p>
      <div style={{ background: C.surfaceLight, color: C.text, padding: "24px", borderRadius: 12, margin: "20px 0", textAlign: "center", border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 13, letterSpacing: 2, color: C.textDim, marginBottom: 8 }}>THE KEY CONCEPT</div>
        <div style={{ fontSize: 22, fontWeight: 700, lineHeight: 1.4 }}>The uterus is a muscle.<br /><span style={{ color: C.accent }}>Contraction = compression of blood vessels = haemostasis.</span></div>
      </div>
      <p style={{ fontSize: 14, lineHeight: 1.7, color: C.textMuted }}>At term, the uterus receives approximately <strong style={{ color: C.text }}>600–700 mL/min</strong> of blood flow through the spiral arteries of the placental bed. After the placenta separates, the myometrium must contract to clamp down on these open vessels — like a living tourniquet. When it doesn't contract (<strong style={{ color: C.text }}>uterine atony</strong>), the patient bleeds. Fast.</p>
      <Expand title="How to assess uterine tone (fundal assessment)">
        <p>Palpate the uterus through the abdominal wall. Post-delivery, the fundus should be firm — like a grapefruit — and approximately at the level of the umbilicus.</p>
        <p><strong style={{ color: C.text }}>Firm fundus</strong> = uterus is contracting = good tone.<br /><strong style={{ color: C.text }}>Soft or "boggy" fundus</strong> = uterine atony = the bleeding won't stop without intervention.</p>
        <p style={{ fontSize: 13, color: C.textDim }}>This is the single most important physical finding in PPH. Learn to assess it confidently.</p>
      </Expand>
      <Expand title="Uterine height landmarks (BLS PCS)">
        <p><strong style={{ color: C.text }}>Uterus at the umbilicus</strong> = ~20 weeks gestational size<br /><strong style={{ color: C.text }}>Uterus at the costal margins</strong> = ~36 weeks gestational size</p>
        <p>Post-delivery, the fundus normally shrinks back down toward the umbilicus over the hours and days following birth. If you find it significantly above the umbilicus postpartum, consider retained products or a distended bladder.</p>
      </Expand>
      <Quiz questions={[{ stem: 'You palpate the fundus of a postpartum patient and it feels soft and "mushy." What does this suggest?', options: ["Normal uterine involution — no action needed", "Uterine atony — the most common cause of PPH", "Retained placental fragments", "Uterine rupture"], correct: 1, rationale: 'A soft or "boggy" uterus indicates atony — the myometrium is not contracting adequately to compress the placental bed vessels. This is the #1 cause of PPH and the one most amenable to prehospital intervention with EUM (External Uterine Massage) and oxytocin.' }]} />
    </div>
  );
}

function FourTsSection() {
  const [activeT, setActiveT] = useState(null);
  const ts = [
    { word: "Tone", pct: "~70%", desc: "Uterine atony — the muscle isn't contracting. This is the most common cause and the one you can directly treat in the field with fundal massage and oxytocin.", fieldAction: "EUM (External Uterine Massage) → Oxytocin 10 units IM → External bimanual compression if unresponsive.", color: C.accent },
    { word: "Trauma", pct: "~20%", desc: "Lacerations to the cervix, vagina, or perineum, or rarely uterine rupture. Think about this if the uterus is firm but bleeding continues.", fieldAction: "Direct pressure where possible. This is largely a surgical problem — rapid transport. Do NOT pack the vagina.", color: C.orange },
    { word: "Tissue", pct: "~9%", desc: "Retained placental fragments or membranes prevent full uterine contraction. Inspect the placenta for completeness after delivery.", fieldAction: "Inspect the placenta. If fragments appear missing, package and transport. Do NOT attempt manual removal. Fundal massage may still help.", color: "#f1c40f" },
    { word: "Thrombin", pct: "~1%", desc: "Coagulopathy — inherited or acquired (DIC, pre-eclampsia, amniotic fluid embolism). Rare in the field but deadly.", fieldAction: "Suspect if bleeding is non-clotting or oozing from IV sites/mucous membranes. Rapid transport — this is a hospital problem.", color: C.purple },
  ];
  return (
    <div>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: C.text }}>The <strong>4 T's</strong> framework helps you rapidly sort <em>why</em> this patient is bleeding — because the cause determines your management. Tap each one.</p>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8, margin: "20px 0" }}>
        {ts.map((t, i) => (
          <button key={i} onClick={() => setActiveT(activeT === i ? null : i)} style={{ padding: "16px 8px", background: activeT === i ? t.color + "18" : C.surface, border: `2px solid ${activeT === i ? t.color : C.border}`, borderRadius: 10, cursor: "pointer", textAlign: "center", transition: "all 0.2s ease", fontFamily: "inherit" }}>
            <div style={{ fontSize: 26, fontWeight: 800, color: t.color, fontFamily: "'DM Mono', monospace" }}>{t.pct}</div>
            <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginTop: 4 }}>{t.word}</div>
          </button>
        ))}
      </div>
      {activeT !== null && (
        <div style={{ padding: "18px 20px", background: ts[activeT].color + "10", borderLeft: `4px solid ${ts[activeT].color}`, borderRadius: "0 10px 10px 0", marginBottom: 16, transition: "all 0.3s ease" }}>
          <div style={{ fontWeight: 700, fontSize: 16, color: ts[activeT].color, marginBottom: 8 }}>{ts[activeT].word}</div>
          <p style={{ fontSize: 14, lineHeight: 1.65, margin: "0 0 12px", color: C.textMuted }}>{ts[activeT].desc}</p>
          <div style={{ padding: "10px 14px", background: "rgba(255,255,255,0.04)", borderRadius: 6, fontSize: 13, lineHeight: 1.55, color: C.textMuted }}><strong style={{ color: C.text }}>Field action:</strong> {ts[activeT].fieldAction}</div>
        </div>
      )}
      <Callout type="tip">In the field, your primary focus is <strong>Tone</strong> — it's the most common cause AND the one you have interventions for. But always confirm: Is the uterus firm? If yes, think Trauma, Tissue, or Thrombin and transport.</Callout>
      <Quiz questions={[{ stem: "Postpartum bleeding is heavy. The fundus is firm. What's your next consideration?", options: ["Continue fundal massage — it will eventually work", "Administer oxytocin — atony must be the cause", "Consider Trauma or Tissue — firm fundus suggests the uterus IS contracting", "Apply a tourniquet to the lower abdomen"], correct: 2, rationale: "A firm fundus means the uterus IS contracting (tone is adequate). Continued bleeding despite good tone points to lacerations (Trauma) or retained fragments (Tissue). Transport rapidly — these causes require surgical management." }]} />
    </div>
  );
}

function BLSSection() {
  const [step, setStep] = useState(0);
  const steps = [
    { title: "1. Recognize & Estimate Blood Loss", content: (<><p>As per the BLS PCS, assess for estimated blood loss: duration of hemorrhage, rate of flow, and presence of clots. Visual estimation is unreliable — use surrogate markers (number of towels/pads soaked, pooling under patient).</p><Callout type="warning">Pregnant patients can lose 30-40% of blood volume before showing classic signs of shock. Tachycardia is an early sign — don't wait for hypotension.</Callout></>) },
    { title: "2. Palpate the Fundus", content: (<><p>This is your key assessment. Is the fundus <strong style={{ color: C.text }}>firm</strong> (good tone) or <strong style={{ color: C.text }}>soft/boggy</strong> (atony)?</p><p>The answer determines your management pathway. A boggy uterus is an atony problem → mechanical and pharmacological interventions. A firm uterus with ongoing bleeding → transport priority (trauma/tissue problem).</p></>) },
    { title: "3. Encourage Voiding & Nipple Stimulation", content: (<><p>A full bladder can physically prevent the uterus from contracting effectively. Encourage the patient to empty their bladder if possible.</p><p>Encourage infant latching or nipple stimulation — this triggers the body's own natural oxytocin release, which promotes uterine contraction.</p><Callout type="pcs">Both of these steps come from the ALS PCS v5.4 Companion Document, listed under the EUM (External Uterine Massage) and External Bimanual Compression procedures.</Callout><Callout type="tip">These are simple, zero-risk interventions that are easy to forget in the stress of an active bleed. Build them into your mental checklist.</Callout></>) },
    { title: "4. EUM (External Uterine Massage)", content: (<><Callout type="pcs"><strong>Per ALS PCS v5.4 & Companion Document:</strong> EUM (External Uterine Massage) should be performed only when the placenta has been delivered and there is excessive bleeding. Continue until bleeding stops.</Callout><p><strong style={{ color: C.text }}>Technique:</strong></p><ol style={{ paddingLeft: 20, lineHeight: 1.8, color: C.textMuted }}><li>Place one hand on the lower abdomen at the level of the symphysis pubis in a cupped position, supporting the lower uterus.</li><li>Place the other hand at the top of the uterine fundus (the uterus should be palpable between both hands).</li><li>Massage with the upper hand using a <strong style={{ color: C.text }}>circular motion</strong>. The lower hand remains still, supporting.</li><li>Continue until postpartum bleeding stops.</li></ol><Callout type="warning"><strong>Do NOT pack the vagina to control bleeding.</strong> This is explicitly stated in the PCS.</Callout></>) },
    { title: "5. External Bimanual Compression (if EUM fails)", content: (<><p>If EUM (External Uterine Massage) is not controlling the bleeding, escalate to external bimanual compression. This is a more aggressive intervention — you are physically squeezing the uterus between both hands.</p><Callout type="pcs"><strong>Key difference from EUM:</strong> External bimanual compression can be performed <strong>regardless of whether the placenta has been delivered</strong>. This is critical to know — EUM requires the placenta out, but bimanual does not.</Callout><p><strong style={{ color: C.text }}>Technique:</strong></p><ol style={{ paddingLeft: 20, lineHeight: 1.8, color: C.textMuted }}><li>Place one hand on the lower abdomen at the level of the symphysis pubis — cup the hand, supporting the lower uterus.</li><li>Place the other hand at the top of the uterine fundus.</li><li><strong style={{ color: C.text }}>Compress the uterus between both hands continuously</strong> — this is different from massage. You are applying steady, firm pressure.</li><li>Maintain compression as long as possible (may require rotation of providers) until bleeding stops.</li></ol><Callout type="tip">This is physically demanding. If you have a partner, plan to rotate. The Companion Document acknowledges this may require rotation of providers.</Callout></>) },
  ];
  return (
    <div>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: C.text }}>Walk through the BLS management steps in order. These are <strong>PCP-scope</strong> interventions every paramedic should be confident performing.</p>
      <div style={{ display: "flex", gap: 4, marginBottom: 20, flexWrap: "wrap" }}>
        {steps.map((s, i) => (<button key={i} onClick={() => setStep(i)} style={{ padding: "8px 14px", background: step === i ? C.accent : C.surface, color: step === i ? "#fff" : C.textDim, border: `1px solid ${step === i ? C.accent : C.border}`, borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600, fontFamily: "inherit", transition: "all 0.2s ease" }}>Step {i + 1}</button>))}
      </div>
      <div style={{ padding: "20px", background: C.surface, borderRadius: 10, border: `1px solid ${C.border}` }}>
        <h3 style={{ fontSize: 16, fontWeight: 700, color: C.text, marginTop: 0, marginBottom: 14 }}>{steps[step].title}</h3>
        <div style={{ fontSize: 14, lineHeight: 1.7, color: C.textMuted }}>{steps[step].content}</div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", marginTop: 12 }}>
        <button onClick={() => setStep(Math.max(0, step - 1))} disabled={step === 0} style={{ padding: "8px 16px", background: step === 0 ? C.surface : C.surfaceLight, color: step === 0 ? C.textDim : C.text, border: `1px solid ${C.border}`, borderRadius: 6, cursor: step === 0 ? "default" : "pointer", fontSize: 13, fontFamily: "inherit" }}>← Previous</button>
        <button onClick={() => setStep(Math.min(steps.length - 1, step + 1))} disabled={step === steps.length - 1} style={{ padding: "8px 16px", background: step === steps.length - 1 ? C.surface : C.accent, color: step === steps.length - 1 ? C.textDim : "#fff", border: "none", borderRadius: 6, cursor: step === steps.length - 1 ? "default" : "pointer", fontSize: 13, fontFamily: "inherit" }}>Next →</button>
      </div>
      <Quiz questions={[{ stem: "EUM (External Uterine Massage) is not controlling the bleeding. The placenta has not yet delivered. What is your next intervention?", options: ["Continue EUM only — bimanual compression requires placenta delivery first", "Perform external bimanual compression — it can be done with or without the placenta delivered", "Administer oxytocin — it works even before placental delivery", "Pack the vagina with gauze and transport"], correct: 1, rationale: 'Per the Companion Document: "External bimanual compression can be performed regardless of if the placenta is delivered or not." This is different from EUM, which requires the placenta to be delivered first. And never pack the vagina — the PCS explicitly prohibits it.' }]} />
    </div>
  );
}

function ALSOxytocinSection() {
  return (
    <div>
      <Callout type="pcs"><strong>This is a PCP-scope medical directive (ALS PCS v5.4, Section 1).</strong> All Primary Care Paramedics in Ontario are authorized to administer oxytocin under this directive.</Callout>
      <div style={{ background: C.surfaceLight, color: C.text, padding: "24px", borderRadius: 12, margin: "20px 0", border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 11, letterSpacing: 3, color: C.textDim, marginBottom: 14 }}>OXYTOCIN — QUICK REFERENCE</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 14 }}>
          {[{ label: "Route", value: "IM" }, { label: "Dose", value: "10 units" }, { label: "Max Single Dose", value: "10 units" }, { label: "Max # Doses", value: "1" }].map((d, i) => (
            <div key={i} style={{ padding: "12px", background: "rgba(255,255,255,0.04)", borderRadius: 8, textAlign: "center" }}>
              <div style={{ fontSize: 11, color: C.textDim, marginBottom: 4 }}>{d.label}</div>
              <div style={{ fontSize: 20, fontWeight: 800, fontFamily: "'DM Mono', monospace", color: C.text }}>{d.value}</div>
            </div>
          ))}
        </div>
      </div>
      <Expand title="Conditions (when to give it)" color={C.green}>
        <ul style={{ paddingLeft: 18, lineHeight: 1.9 }}>
          <li><strong style={{ color: C.text }}>Age:</strong> Childbearing years (~14–50)</li>
          <li><strong style={{ color: C.text }}>SBP:</strong> &lt;160 mmHg</li>
          <li><strong style={{ color: C.text }}>Timing:</strong> Post-delivery of all fetuses AND/OR placenta</li>
          <li>Post-placental delivery (normally given once the placenta is out — whether bleeding is heavy or not — to help the uterus stay contracted)</li>
        </ul>
      </Expand>
      <Expand title="Contraindications (when NOT to give it)" color={C.accent}>
        <ul style={{ paddingLeft: 18, lineHeight: 1.9 }}>
          <li>Allergy or sensitivity to oxytocin</li>
          <li>Undelivered fetus</li>
          <li>Suspected or known <strong style={{ color: C.text }}>pre-eclampsia</strong> with current pregnancy</li>
          <li><strong style={{ color: C.text }}>Eclampsia</strong> (seizures) with current pregnancy</li>
          <li>≥4 hours post placenta delivery</li>
        </ul>
        <Callout type="warning">There is evidence that oxytocin can induce vasoconstriction, therefore exacerbating hypertension. This is why pre-eclampsia/eclampsia and SBP ≥160 are contraindications.</Callout>
      </Expand>
      <Expand title="Why does oxytocin work?" color={C.blue}>
        <p>Oxytocin stimulates the myometrium to contract — the same mechanism that drives labour contractions. Postpartum, it causes sustained uterine contraction which compresses the spiral arteries at the placental site, reducing blood loss.</p>
        <p>The WHO endorses oxytocin as the gold-standard uterotonic for PPH prevention and management. The ALS PCS Companion Document notes that its addition has the potential to dramatically affect maternal morbidity and mortality in massive PPH.</p>
      </Expand>
      <Expand title="Clinical sequencing — when in the algorithm?" color={C.orange}>
        <p>Per the ALS PCS treatment section:</p>
        <ol style={{ paddingLeft: 18, lineHeight: 1.9 }}>
          <li>Deliver the neonate and manage the cord</li>
          <li>Await placental delivery (controlled cord traction during contractions)</li>
          <li>Post-placental delivery → <strong style={{ color: C.text }}>consider EUM (External Uterine Massage)</strong></li>
          <li><strong style={{ color: C.text }}>Consider oxytocin</strong> — 10 units IM × 1 dose</li>
          <li>If bleeding continues despite EUM + oxytocin → external bimanual compression</li>
        </ol>
        <Callout type="myth"><strong>Why not give oxytocin right away after the baby is born?</strong><br />If you give oxytocin before the placenta has had a chance to separate and deliver, you can cause the uterus to clamp down and trap the placenta inside. A retained placenta then becomes its own cause of PPH (the "Tissue" T). So in a normal, uncomplicated field delivery: baby comes out, you manage the cord, you wait for the placenta to separate and deliver, and then once the placenta is out you give oxytocin 10 units IM to help the uterus firm up and stay contracted — whether there's heavy bleeding or not.<br /><br />The AND/OR wording in the directive gives you the flexibility to give it earlier if things aren't going well. If the baby is out but the placenta hasn't come yet and you've got significant bleeding, you don't have to sit there waiting. But if the delivery is going smoothly, let the placenta come out first, then give it.</Callout>
      </Expand>
      <Quiz questions={[
        { stem: "A 32-year-old G3P3 just delivered. Placenta is out. BP is 148/92. She has a history of pre-eclampsia in a previous pregnancy but not this one. Moderate bleeding with a boggy fundus. Can you give oxytocin?", options: ["No — any history of pre-eclampsia is a contraindication", "Yes — the contraindication is pre-eclampsia with the CURRENT pregnancy, and SBP is <160", "No — SBP is too high at 148", "Yes — but give it IV instead of IM for faster onset"], correct: 1, rationale: 'The contraindication is "suspected or known pre-eclampsia with CURRENT pregnancy." History of pre-eclampsia in a prior pregnancy is not a contraindication. SBP <160 is met (148 < 160). Route is IM only — there is no IV route in this directive.' },
        { stem: "Baby is out but the placenta hasn't delivered yet. Bleeding is getting heavy. Can you give oxytocin?", options: ["No — oxytocin requires placental delivery first", "Yes — the condition states delivery of all fetuses AND/OR placenta", "No — you need a base hospital patch first", "Yes — but only at half dose (5 units)"], correct: 1, rationale: 'The conditions state "Postpartum delivery AND/OR Placental delivery." The AND/OR is key — delivery of the fetus alone meets the condition. You do NOT need to wait for the placenta.' }
      ]} />
    </div>
  );
}

function DecisionToolSection() {
  const [placenta, setPlacenta] = useState(null);
  const [fundus, setFundus] = useState(null);
  const [eumResponse, setEumResponse] = useState(null);
  const [oxyContra, setOxyContra] = useState(null);
  const reset = () => { setPlacenta(null); setFundus(null); setEumResponse(null); setOxyContra(null); };
  const btnStyle = (active) => ({ padding: "10px 20px", background: active ? C.accent : C.surface, color: active ? "#fff" : C.textMuted, border: active ? `2px solid ${C.accent}` : `2px solid ${C.border}`, borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 600, fontFamily: "inherit", transition: "all 0.15s ease" });
  return (
    <div>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: C.text, marginBottom: 20 }}>Walk through this interactive decision tool. Answer each question to get your management pathway.</p>
      <button onClick={reset} style={{ ...btnStyle(false), marginBottom: 20, fontSize: 12, padding: "6px 14px" }}>🔄 Reset Tool</button>
      <div style={{ marginBottom: 20, padding: "16px 20px", background: C.surface, borderRadius: 10, border: `1px solid ${C.border}` }}>
        <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10, color: C.text }}>Has the placenta been delivered?</div>
        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
          <button onClick={() => { setPlacenta("yes"); setFundus(null); setEumResponse(null); setOxyContra(null); }} style={btnStyle(placenta === "yes")}>Yes</button>
          <button onClick={() => { setPlacenta("no"); setFundus(null); setEumResponse(null); setOxyContra(null); }} style={btnStyle(placenta === "no")}>No</button>
        </div>
      </div>
      {placenta && (
        <div style={{ marginBottom: 20, padding: "16px 20px", background: C.surface, borderRadius: 10, border: `1px solid ${C.border}` }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10, color: C.text }}>What does the fundus feel like?</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button onClick={() => { setFundus("boggy"); setEumResponse(null); setOxyContra(null); }} style={btnStyle(fundus === "boggy")}>Soft / Boggy</button>
            <button onClick={() => { setFundus("firm"); setEumResponse(null); setOxyContra(null); }} style={btnStyle(fundus === "firm")}>Firm</button>
          </div>
        </div>
      )}
      {fundus === "firm" && (<Callout type="warning"><strong>Firm fundus + ongoing bleeding = NOT an atony problem.</strong><br />Think Trauma (lacerations) or Tissue (retained fragments). Apply direct pressure where visible, do NOT pack the vagina, and initiate rapid transport. Bimanual compression is unlikely to help here — the uterus is already contracted.</Callout>)}
      {fundus === "boggy" && placenta === "yes" && (<>
        <Callout type="pcs"><strong>Placenta OUT + Boggy fundus → Perform EUM (External Uterine Massage).</strong> Begin circular massage at the fundus with the lower hand cupping and supporting at the symphysis pubis. Encourage voiding and nipple stimulation.</Callout>
        <div style={{ marginBottom: 20, padding: "16px 20px", background: C.surface, borderRadius: 10, border: `1px solid ${C.border}` }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10, color: C.text }}>Is EUM (External Uterine Massage) controlling the bleeding?</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button onClick={() => { setEumResponse("yes"); setOxyContra(null); }} style={btnStyle(eumResponse === "yes")}>Yes — bleeding slowing</button>
            <button onClick={() => { setEumResponse("no"); setOxyContra(null); }} style={btnStyle(eumResponse === "no")}>No — still hemorrhaging</button>
          </div>
        </div>
      </>)}
      {fundus === "boggy" && placenta === "no" && (<>
        <Callout type="pcs"><strong>Placenta NOT delivered + Boggy fundus:</strong> Attempt placental delivery using gentle controlled cord traction during contractions while patient pushes. Consider oxytocin (conditions allow post-fetus delivery even if placenta still in). If unsuccessful and hemorrhaging → external bimanual compression (CAN be done with placenta in) and transport.</Callout>
        <div style={{ marginBottom: 20, padding: "16px 20px", background: C.surface, borderRadius: 10, border: `1px solid ${C.border}` }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10, color: C.text }}>Any contraindications to oxytocin?</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button onClick={() => setOxyContra("no")} style={btnStyle(oxyContra === "no")}>No contraindications</button>
            <button onClick={() => setOxyContra("yes")} style={btnStyle(oxyContra === "yes")}>Yes — contraindicated</button>
          </div>
        </div>
        {oxyContra === "no" && (<Callout type="tip"><strong>Give Oxytocin 10 units IM × 1.</strong> Continue attempts at placental delivery. If bleeding uncontrolled → external bimanual compression + rapid transport.</Callout>)}
        {oxyContra === "yes" && (<Callout type="warning"><strong>Oxytocin contraindicated.</strong> Rely on mechanical interventions: attempt placental delivery, external bimanual compression if hemorrhaging, and initiate rapid transport.</Callout>)}
      </>)}
      {eumResponse === "yes" && (<Callout type="tip"><strong>Continue EUM (External Uterine Massage) until bleeding stops. Consider oxytocin 10 units IM if not yet given</strong> (check conditions: SBP &lt;160, no pre-eclampsia/eclampsia this pregnancy, no allergy). Monitor closely — atony can recur. Transport.</Callout>)}
      {eumResponse === "no" && (<>
        <div style={{ marginBottom: 20, padding: "16px 20px", background: C.surface, borderRadius: 10, border: `1px solid ${C.border}` }}>
          <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 10, color: C.text }}>Any contraindications to oxytocin?</div>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <button onClick={() => setOxyContra("no")} style={btnStyle(oxyContra === "no")}>No contraindications</button>
            <button onClick={() => setOxyContra("yes")} style={btnStyle(oxyContra === "yes")}>Yes — contraindicated</button>
          </div>
        </div>
        {oxyContra === "no" && (<Callout type="tip"><strong>Escalate:</strong> Give Oxytocin 10 units IM × 1. If bleeding persists → external bimanual compression. Continuous compression until bleeding stops or transfer of care. Rapid transport — Load and Go.</Callout>)}
        {oxyContra === "yes" && (<Callout type="warning"><strong>Escalate without oxytocin:</strong> Proceed directly to external bimanual compression. Continuous compression between both hands until bleeding stops or hospital. Rapid transport — Load and Go.</Callout>)}
      </>)}
    </div>
  );
}

function ScenariosSection() {
  const [activeScenario, setActiveScenario] = useState(0);
  const [showAnswer, setShowAnswer] = useState(false);
  const scenarios = [
    { title: "Scenario A: The Routine One That Isn't", setup: "34F, G2P2, delivered 20 minutes ago. Placenta delivered and appears intact. Baby is nursing. Patient says she feels 'fine' but looks pale. You notice steady bleeding soaking through towels. HR 112, BP 118/74, RR 20.", questions: ["What's your first physical assessment?", "Her BP is 'normal' — does that reassure you? Why or why not?", "What's your management plan?"], keyPoints: ["Palpate the fundus — a boggy fundus confirms atony despite 'normal' vitals.", "BP 118/74 in a pregnant patient who was likely 130s+ at baseline may represent significant relative hypotension. HR 112 is the early warning — don't be reassured by 'acceptable' numbers.", "EUM (External Uterine Massage) immediately. Encourage continued nursing (natural oxytocin release). Consider oxytocin 10 units IM. If SBP <160 and no pre-eclampsia this pregnancy → give it. Don't wait for the situation to deteriorate."] },
    { title: "Scenario B: The Contraindication Curveball", setup: "25F, G1P1, precipitous delivery in the ambulance. Placenta not yet delivered. Significant bleeding from vagina. Patient reports she was told at her last appointment she has \"pregnancy-induced high blood pressure.\" BP now 162/104. HR 98.", questions: ["Can you give oxytocin? Walk through the contraindication checklist.", "What mechanical interventions can you perform even without oxytocin?", "What additional concern does this patient's blood pressure raise?"], keyPoints: ["No. 'Pregnancy-induced high blood pressure' likely = pre-eclampsia. SBP is also ≥160. Both are contraindications to oxytocin. You must rely on mechanical interventions.", "Attempt placental delivery (gentle controlled cord traction during contractions). If hemorrhaging, external bimanual compression CAN be performed even without placenta delivery. Encourage voiding.", "This patient may be pre-eclamptic and at risk for eclampsia (seizures). Monitor closely. This is a Load and Go. Pre-eclampsia should be assumed for patients >20 weeks gestation with BP ≥140/90 per BLS PCS guidelines."] },
    { title: "Scenario C: The 'What Else Could It Be?'", setup: "30F, G3P3, delivered 30 minutes ago at home. Placenta delivered. You've been doing EUM (External Uterine Massage) for 5 minutes, the fundus is now firm, but bleeding hasn't slowed. Patient is anxious, HR 124, BP 96/58.", questions: ["The fundus is firm — is atony still your primary concern?", "What does the 4 T's framework suggest?", "What's your priority now?"], keyPoints: ["No. A firm fundus means the myometrium IS contracting. Atony (Tone) is less likely the cause now.", "With Tone addressed, think Trauma (laceration of the cervix/vagina/perineum) or Tissue (despite appearing intact, retained fragments are possible). Thrombin (coagulopathy) is also possible but less likely.", "This is now primarily a surgical problem. Rapid transport. Apply direct pressure to any visible perineal lacerations. Do NOT pack the vagina. Continue monitoring vitals — BP 96/58 with HR 124 indicates she is already decompensating."] },
  ];
  return (
    <div>
      <p style={{ fontSize: 15, lineHeight: 1.7, color: C.text, marginBottom: 16 }}>Work through these scenarios. Try to form your answer <em>before</em> revealing the key points.</p>
      <div style={{ display: "flex", gap: 6, marginBottom: 20, flexWrap: "wrap" }}>
        {scenarios.map((s, i) => (<button key={i} onClick={() => { setActiveScenario(i); setShowAnswer(false); }} style={{ padding: "8px 14px", background: activeScenario === i ? C.accent : C.surface, color: activeScenario === i ? "#fff" : C.textDim, border: `1px solid ${activeScenario === i ? C.accent : C.border}`, borderRadius: 6, cursor: "pointer", fontSize: 13, fontWeight: 600, fontFamily: "inherit" }}>Scenario {String.fromCharCode(65 + i)}</button>))}
      </div>
      <div style={{ padding: 20, background: C.surface, borderRadius: 10, border: `1px solid ${C.border}` }}>
        <h3 style={{ fontSize: 16, fontWeight: 700, color: C.text, marginTop: 0 }}>{scenarios[activeScenario].title}</h3>
        <div style={{ padding: "14px 16px", background: C.surfaceLight, color: C.text, borderRadius: 8, fontSize: 14, lineHeight: 1.65, marginBottom: 16, fontFamily: "'DM Mono', monospace", border: `1px solid ${C.border}` }}>{scenarios[activeScenario].setup}</div>
        <div style={{ fontWeight: 600, fontSize: 14, marginBottom: 8, color: C.accent }}>Think about:</div>
        <ol style={{ paddingLeft: 20, fontSize: 14, lineHeight: 1.8, color: C.textMuted, marginBottom: 16 }}>{scenarios[activeScenario].questions.map((q, i) => (<li key={i}>{q}</li>))}</ol>
        {!showAnswer ? (
          <button onClick={() => setShowAnswer(true)} style={{ padding: "10px 24px", background: C.accent, color: "#fff", border: "none", borderRadius: 8, cursor: "pointer", fontSize: 14, fontWeight: 600, fontFamily: "inherit" }}>Reveal Key Points</button>
        ) : (
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 10, color: C.green }}>Key Points:</div>
            {scenarios[activeScenario].keyPoints.map((kp, i) => (<div key={i} style={{ padding: "12px 14px", background: C.greenGlow, borderLeft: `3px solid ${C.green}`, borderRadius: "0 6px 6px 0", marginBottom: 8, fontSize: 14, lineHeight: 1.6, color: C.textMuted }}><strong style={{ color: C.text }}>{i + 1}.</strong> {kp}</div>))}
          </div>
        )}
      </div>
    </div>
  );
}

function SummarySection() {
  return (
    <div>
      <Callout type="info"><strong>Print this section</strong> or screenshot it for your duty bag. Review at 1 day, 1 week, and 1 month for spaced retention.</Callout>
      <div style={{ background: C.surfaceLight, color: C.text, padding: "24px", borderRadius: 12, marginBottom: 20, border: `1px solid ${C.border}` }}>
        <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 16, textAlign: "center" }}>PPH Rapid Reference</div>
        <div style={{ fontSize: 13, lineHeight: 1.8, color: C.textMuted }}>
          <div style={{ fontWeight: 700, color: C.accent, marginBottom: 6 }}>5 MUST-KNOW TAKEAWAYS</div>
          <div style={{ marginBottom: 14 }}>
            1. <strong style={{ color: C.text }}>Postpartum patient bleeding? Palpate the fundus first</strong> — boggy = atony = your problem to fix with EUM (External Uterine Massage) and oxytocin. Firm = think Trauma/Tissue → transport.<br />
            2. <strong style={{ color: C.text }}>EUM technique:</strong> Lower hand cups at symphysis (still). Upper hand massages fundus (circular). Placenta must be out for EUM.<br />
            3. <strong style={{ color: C.text }}>Bimanual compression</strong> is your escalation — and it works with OR without the placenta delivered.<br />
            4. <strong style={{ color: C.text }}>Oxytocin:</strong> 10 units IM × 1. SBP &lt;160. No pre-eclampsia/eclampsia THIS pregnancy. No undelivered fetus. ≤4h post placenta.<br />
            5. <strong style={{ color: C.text }}>Never pack the vagina.</strong> Never. It's in the PCS. Know it.
          </div>
          <div style={{ fontWeight: 700, color: C.orange, marginBottom: 6 }}>MANAGEMENT ESCALATION LADDER</div>
          <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 12, lineHeight: 2, padding: "10px 14px", background: "rgba(255,255,255,0.04)", borderRadius: 6 }}>
            Empty bladder + Nipple stimulation<br />&nbsp;&nbsp;↓<br />EUM (External Uterine Massage) — placenta out<br />&nbsp;&nbsp;↓<br />Oxytocin 10 units IM × 1 (check contraindications)<br />&nbsp;&nbsp;↓<br />External Bimanual Compression (±placenta)<br />&nbsp;&nbsp;↓<br />Rapid Transport — Load and Go
          </div>
        </div>
      </div>
      <div style={{ padding: "18px 20px", background: "rgba(155,89,182,0.08)", border: `1px solid rgba(155,89,182,0.2)`, borderRadius: 10, marginBottom: 16 }}>
        <div style={{ fontWeight: 700, fontSize: 14, color: C.purple, marginBottom: 8 }}>🚑 Next Shift Challenge</div>
        <div style={{ fontSize: 14, lineHeight: 1.65, color: C.textMuted }}>
          <strong style={{ color: C.text }}>1.</strong> Find your OBS kit. Open it. Can you locate everything by touch? Know what's in there before you need it at 3 AM.<br />
          <strong style={{ color: C.text }}>2.</strong> Practice palpating a fundus — use a simulation model, or visualize the landmarks on your own abdomen (umbilicus = 20 weeks, costal margins = 36 weeks).<br />
          <strong style={{ color: C.text }}>3.</strong> Quiz your partner: "Oxytocin — dose, route, contraindications. Go." Make it a 30-second drill.
        </div>
      </div>
      <div style={{ padding: "14px 16px", background: C.surface, borderRadius: 8, fontSize: 12, color: C.textDim, lineHeight: 1.6, border: `1px solid ${C.border}` }}>
        <strong style={{ color: C.textMuted }}>Sources:</strong> Ontario BLS Patient Care Standards v3.4 (2023), ALS Patient Care Standards v5.4 (2025), ALS PCS v5.4 Companion Document. All drug information per Ontario PCS. Always verify clinical content for accuracy before distributing.
      </div>
    </div>
  );
}

function PPHModule() {
  const [activeSection, setActiveSection] = useState(0);
  const [completedSections, setCompletedSections] = useState(new Set());
  const contentRef = useRef(null);
  const markComplete = (idx) => { setCompletedSections((prev) => new Set([...prev, idx])); };
  const goTo = (idx) => { markComplete(activeSection); setActiveSection(idx); if (contentRef.current) contentRef.current.scrollTo({ top: 0, behavior: "smooth" }); };
  const renderSection = () => {
    switch (SECTIONS[activeSection]) {
      case "dispatch": return <DispatchSection />;
      case "whyCare": return <WhyCareSection />;
      case "anatomy": return <AnatomySection />;
      case "fourTs": return <FourTsSection />;
      case "blsManagement": return <BLSSection />;
      case "alsOxytocin": return <ALSOxytocinSection />;
      case "decisionTool": return <DecisionToolSection />;
      case "scenarios": return <ScenariosSection />;
      case "summary": return <SummarySection />;
      default: return null;
    }
  };
  const progress = ((completedSections.size) / SECTIONS.length) * 100;
  return (
    <div style={{ fontFamily: "'Inter', 'Segoe UI', -apple-system, sans-serif", maxWidth: 800, margin: "0 auto", color: C.text, minHeight: "100vh", background: C.bg }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
      <div style={{ background: C.surface, color: C.text, padding: "32px 24px 24px", borderBottom: `1px solid ${C.border}` }}>
        <div style={{ fontFamily: "'DM Mono', monospace", fontSize: 11, letterSpacing: 3, color: C.textDim, marginBottom: 8 }}>INTERACTIVE LEARNING MODULE</div>
        <h1 style={{ fontSize: 24, fontWeight: 800, margin: "0 0 6px", lineHeight: 1.3 }}>Postpartum Hemorrhage</h1>
        <div style={{ fontSize: 14, color: C.textDim, marginBottom: 16 }}>Ontario PCP / ACP Scope • BLS PCS v3.4 & ALS PCS v5.4</div>
        <div style={{ background: "rgba(255,255,255,0.06)", borderRadius: 100, height: 6, overflow: "hidden" }}>
          <div style={{ width: `${progress}%`, height: "100%", background: C.accent, borderRadius: 100, transition: "width 0.4s ease" }} />
        </div>
        <div style={{ fontSize: 11, color: C.textDim, marginTop: 6 }}>{completedSections.size} of {SECTIONS.length} sections reviewed</div>
      </div>
      <div style={{ display: "flex", overflowX: "auto", gap: 4, padding: "16px 16px 0", WebkitOverflowScrolling: "touch", background: C.bg }}>
        {SECTIONS.map((s, i) => (
          <button key={s} onClick={() => goTo(i)} style={{ padding: "8px 14px", background: activeSection === i ? C.accent : completedSections.has(i) ? C.greenGlow : C.surface, color: activeSection === i ? "#fff" : completedSections.has(i) ? C.green : C.textDim, border: `1px solid ${activeSection === i ? C.accent : C.border}`, borderRadius: 6, cursor: "pointer", fontSize: 12, fontWeight: 600, whiteSpace: "nowrap", fontFamily: "inherit", flexShrink: 0, transition: "all 0.15s ease" }}>
            {completedSections.has(i) && activeSection !== i ? "✓ " : ""}{SECTION_LABELS[s]}
          </button>
        ))}
      </div>
      <div ref={contentRef} style={{ padding: "20px 20px 40px" }}>
        <h2 style={{ fontSize: 20, fontWeight: 700, margin: "0 0 20px", paddingBottom: 12, borderBottom: `2px solid ${C.border}`, color: C.text }}>{SECTION_LABELS[SECTIONS[activeSection]]}</h2>
        {renderSection()}
        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 32, paddingTop: 20, borderTop: `1px solid ${C.border}` }}>
          <button onClick={() => goTo(Math.max(0, activeSection - 1))} disabled={activeSection === 0} style={{ padding: "10px 20px", background: activeSection === 0 ? C.surface : C.surfaceLight, color: activeSection === 0 ? C.textDim : C.text, border: `1px solid ${C.border}`, borderRadius: 8, cursor: activeSection === 0 ? "default" : "pointer", fontSize: 14, fontWeight: 600, fontFamily: "inherit" }}>← Previous</button>
          <button onClick={() => goTo(Math.min(SECTIONS.length - 1, activeSection + 1))} disabled={activeSection === SECTIONS.length - 1} style={{ padding: "10px 20px", background: activeSection === SECTIONS.length - 1 ? C.surface : C.accent, color: activeSection === SECTIONS.length - 1 ? C.textDim : "#fff", border: "none", borderRadius: 8, cursor: activeSection === SECTIONS.length - 1 ? "default" : "pointer", fontSize: 14, fontWeight: 600, fontFamily: "inherit" }}>Next Section →</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(React.createElement(PPHModule), document.getElementById("root"));

</script>
