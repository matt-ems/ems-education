<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEMCA — Practice Exam</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&display=swap');

/* ── LIQUID GLASS LIGHT (default) ── */
:root {
  --bg-primary: linear-gradient(145deg, #e3e8f0 0%, #c9d6e8 25%, #d5c8db 50%, #c8d5e0 75%, #dde4ed 100%);
  --bg-primary-solid: #dde1ea;
  --bg-secondary: rgba(255,255,255,0.35);
  --bg-card: rgba(255,255,255,0.45);
  --bg-card-hover: rgba(255,255,255,0.6);
  --glass-border: rgba(255,255,255,0.65);
  --glass-inner: 0 1px 0 rgba(255,255,255,0.8) inset;
  --border: rgba(255,255,255,0.55);
  --border-active: #007AFF;
  --text-primary: #1d1d1f;
  --text-secondary: rgba(0,0,0,0.55);
  --text-muted: rgba(0,0,0,0.35);
  --accent: #007AFF;
  --accent-light: #3395FF;
  --accent-dim: rgba(0,122,255,0.1);
  --accent-glow: rgba(0,122,255,0.2);
  --correct: #34c759;
  --correct-bg: rgba(52,199,89,0.12);
  --correct-border: rgba(52,199,89,0.4);
  --incorrect: #ff3b30;
  --incorrect-bg: rgba(255,59,48,0.08);
  --incorrect-border: rgba(255,59,48,0.35);
  --radius: 14px;
  --radius-lg: 22px;
  --shadow: 0 8px 32px rgba(0,0,0,0.08), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.1);
  --card-shadow: 0 8px 32px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.03);
  --toggle-bg: rgba(255,255,255,0.5);
  --toggle-knob: #ffffff;
  --blur: blur(40px);
  --option-bg: rgba(255,255,255,0.45);
  --option-border: rgba(255,255,255,0.55);
  --narrative-bg: rgba(255,255,255,0.3);
  --sub-bg: rgba(255,255,255,0.35);
  --progress-track: rgba(0,0,0,0.06);
  --progress-bg: rgba(255,255,255,0.55);
  --stat-bg: rgba(255,255,255,0.45);
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
  --font-display: 'DM Sans', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
}

/* ── LIQUID GLASS DARK ── */
[data-theme="dark"] {
  --bg-primary: linear-gradient(145deg, #0c0e14 0%, #111520 25%, #14111c 50%, #0f1318 75%, #0e1016 100%);
  --bg-primary-solid: #0f1117;
  --bg-secondary: rgba(255,255,255,0.06);
  --bg-card: rgba(255,255,255,0.08);
  --bg-card-hover: rgba(255,255,255,0.12);
  --glass-border: rgba(255,255,255,0.12);
  --glass-inner: 0 1px 0 rgba(255,255,255,0.08) inset;
  --border: rgba(255,255,255,0.1);
  --border-active: #0A84FF;
  --text-primary: #f5f5f7;
  --text-secondary: rgba(255,255,255,0.6);
  --text-muted: rgba(255,255,255,0.35);
  --accent: #0A84FF;
  --accent-light: #409CFF;
  --accent-dim: rgba(10,132,255,0.15);
  --accent-glow: rgba(10,132,255,0.25);
  --correct: #30d158;
  --correct-bg: rgba(48,209,88,0.12);
  --correct-border: rgba(48,209,88,0.35);
  --incorrect: #ff453a;
  --incorrect-bg: rgba(255,69,58,0.1);
  --incorrect-border: rgba(255,69,58,0.35);
  --shadow: 0 8px 32px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.4);
  --card-shadow: 0 8px 32px rgba(0,0,0,0.25), 0 1px 2px rgba(0,0,0,0.15);
  --toggle-bg: rgba(255,255,255,0.1);
  --toggle-knob: #ffffff;
  --option-bg: rgba(255,255,255,0.06);
  --option-border: rgba(255,255,255,0.1);
  --narrative-bg: rgba(255,255,255,0.04);
  --sub-bg: rgba(255,255,255,0.05);
  --progress-track: rgba(255,255,255,0.06);
  --progress-bg: rgba(255,255,255,0.08);
  --stat-bg: rgba(255,255,255,0.07);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  background-attachment: fixed;
  color: var(--text-primary);
  line-height: 1.65;
  min-height: 100vh;
  transition: background 0.5s ease, color 0.3s ease;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  position: relative;
}

/* ── AMBIENT GLOW ORBS ── */
body::before,
body::after {
  content: '';
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
  transition: opacity 0.5s ease;
}
body::before {
  top: -150px;
  right: -100px;
  width: 450px;
  height: 450px;
  background: radial-gradient(circle, rgba(0,122,255,0.1) 0%, transparent 70%);
}
body::after {
  bottom: -120px;
  left: -80px;
  width: 380px;
  height: 380px;
  background: radial-gradient(circle, rgba(175,130,220,0.08) 0%, transparent 70%);
}
[data-theme="dark"] body::before {
  background: radial-gradient(circle, rgba(10,132,255,0.08) 0%, transparent 70%);
}
[data-theme="dark"] body::after {
  background: radial-gradient(circle, rgba(130,80,200,0.06) 0%, transparent 70%);
}

/* ── THEME TOGGLE ── */
.theme-toggle-wrap {
  position: fixed;
  top: 1.25rem;
  right: 1.25rem;
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--bg-card);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: 980px;
  padding: 5px 12px 5px 14px;
  box-shadow: var(--shadow), var(--glass-inner);
}
.theme-toggle-label {
  font-size: 0.65rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.08em;
}
.theme-toggle {
  position: relative;
  width: 44px;
  height: 26px;
  background: var(--toggle-bg);
  border-radius: 13px;
  cursor: pointer;
  transition: background 0.3s ease;
  border: 1px solid var(--border);
  outline: none;
}
.theme-toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 20px;
  height: 20px;
  background: var(--toggle-knob);
  border-radius: 50%;
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
  box-shadow: 0 1px 4px rgba(0,0,0,0.15);
}
[data-theme="dark"] .theme-toggle {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.15);
}
[data-theme="dark"] .theme-toggle::after {
  transform: translateX(18px);
}

/* ── INTRO PAGE ── */
.intro-page {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 2rem;
  text-align: center;
  position: relative;
  z-index: 1;
}
.intro-icon {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--accent), #5856d6);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 1.5rem;
  font-size: 1.8rem;
  color: #fff;
  box-shadow: 0 4px 20px var(--accent-glow);
}
.intro-subtitle {
  font-family: var(--font-display);
  font-size: 0.85rem;
  color: var(--accent);
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.intro-title {
  font-family: var(--font-display);
  font-size: clamp(2.2rem, 5vw, 3.2rem);
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 0.75rem;
  letter-spacing: -0.025em;
  line-height: 1.15;
}
.intro-meta {
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-bottom: 2.5rem;
  font-weight: 400;
}
.intro-meta span {
  color: var(--text-secondary);
  font-weight: 600;
}
.btn-start {
  font-family: var(--font-body);
  font-size: 1rem;
  font-weight: 600;
  padding: 0.9rem 2.5rem;
  background: rgba(0,122,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 980px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
  letter-spacing: 0.01em;
  box-shadow: 0 4px 16px var(--accent-glow), 0 1px 0 rgba(255,255,255,0.2) inset;
}
[data-theme="dark"] .btn-start {
  background: rgba(10,132,255,0.75);
  border-color: rgba(255,255,255,0.15);
}
.btn-start:hover {
  background: rgba(0,122,255,0.95);
  transform: scale(1.04);
  box-shadow: 0 6px 24px var(--accent-glow), 0 1px 0 rgba(255,255,255,0.2) inset;
}
.btn-start:active { transform: scale(0.98); }

/* ── EXAM CONTAINER ── */
.exam-container {
  display: none;
  max-width: 740px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
  position: relative;
  z-index: 1;
}

/* ── PROGRESS BAR ── */
.progress-bar-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--progress-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  padding: 0.85rem 1.1rem 0.75rem;
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  margin-bottom: 2rem;
  transition: all 0.4s ease;
  box-shadow: var(--shadow), var(--glass-inner);
}
.progress-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.5rem;
}
.progress-label {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
}
.progress-count {
  font-size: 0.75rem;
  color: var(--accent);
  font-weight: 600;
  font-variant-numeric: tabular-nums;
}
.progress-track {
  height: 4px;
  background: var(--progress-track);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #5AC8FA);
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}

/* ── SCENARIO BLOCKS ── */
.scenario-header {
  font-size: 0.7rem;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
  padding-top: 1.5rem;
  font-weight: 700;
}
.scenario-title {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 1.5rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
  letter-spacing: -0.01em;
}
.block-narrative {
  background: var(--narrative-bg);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 1.25rem 1.5rem;
  margin-bottom: 1.75rem;
  color: var(--text-secondary);
  font-size: 0.92rem;
  line-height: 1.8;
  box-shadow: var(--shadow), var(--glass-inner);
}

/* ── QUESTION CARD ── */
.question-card {
  background: var(--bg-card);
  backdrop-filter: var(--blur);
  -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 1.5rem;
  box-shadow: var(--card-shadow), var(--glass-inner);
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.question-meta {
  display: flex;
  gap: 0.4rem;
  margin-bottom: 0.85rem;
  flex-wrap: wrap;
}
.q-badge {
  font-size: 0.6rem;
  padding: 0.2rem 0.55rem;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 700;
}
.q-number {
  background: var(--accent-dim);
  color: var(--accent);
}
.q-type {
  background: rgba(142,142,147,0.08);
  color: var(--text-muted);
}
[data-theme="dark"] .q-type {
  background: rgba(255,255,255,0.06);
}
.q-format {
  background: rgba(142,142,147,0.05);
  color: var(--text-muted);
}
[data-theme="dark"] .q-format {
  background: rgba(255,255,255,0.04);
}
.question-stem {
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 1rem;
  line-height: 1.55;
  letter-spacing: -0.005em;
}

/* ── SUB-OPTIONS ── */
.sub-options {
  background: var(--sub-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.85rem 1.1rem;
  margin-bottom: 1rem;
}
.sub-option {
  padding: 0.3rem 0;
  color: var(--text-secondary);
  font-size: 0.88rem;
}
.sub-option span {
  color: var(--accent);
  font-size: 0.8rem;
  font-weight: 700;
  margin-right: 0.5rem;
}

/* ── ANSWER OPTIONS ── */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.option-btn {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 0.9rem 1rem;
  background: var(--option-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1.5px solid var(--option-border);
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.2s ease;
  text-align: left;
  width: 100%;
  font-family: inherit;
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.55;
}
.option-btn:hover:not(.disabled) {
  background: var(--bg-card-hover);
  border-color: var(--accent);
  color: var(--text-primary);
  box-shadow: 0 0 0 1px var(--accent-glow);
}
.option-letter {
  font-weight: 700;
  font-size: 0.75rem;
  min-width: 1.6rem;
  height: 1.6rem;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  background: rgba(255,255,255,0.6);
  border: 1px solid var(--border);
  flex-shrink: 0;
  margin-top: 1px;
  transition: all 0.2s ease;
}
[data-theme="dark"] .option-letter {
  background: rgba(255,255,255,0.08);
}
.option-btn.selected-correct {
  background: var(--correct-bg);
  border-color: var(--correct-border);
  color: var(--text-primary);
}
.option-btn.selected-correct .option-letter {
  background: var(--correct);
  color: #fff;
  border-color: var(--correct);
}
.option-btn.selected-incorrect {
  background: var(--incorrect-bg);
  border-color: var(--incorrect-border);
  color: var(--text-primary);
}
.option-btn.selected-incorrect .option-letter {
  background: var(--incorrect);
  color: #fff;
  border-color: var(--incorrect);
}
.option-btn.show-correct {
  border-color: var(--correct-border);
}
.option-btn.show-correct .option-letter {
  background: var(--correct);
  color: #fff;
  border-color: var(--correct);
}
.option-btn.disabled { cursor: default; opacity: 0.65; }
.option-btn.selected-correct.disabled,
.option-btn.selected-incorrect.disabled,
.option-btn.show-correct.disabled { opacity: 1; }

/* ── RATIONALE ── */
.rationale {
  display: none;
  margin-top: 1rem;
  padding: 1rem 1.25rem;
  background: rgba(52,199,89,0.06);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-left: 3px solid var(--correct);
  border-radius: 0 var(--radius) var(--radius) 0;
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.75;
}
.rationale-label {
  font-size: 0.65rem;
  color: var(--correct);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 0.4rem;
  font-weight: 700;
}

/* ── RESULTS PAGE ── */
.results-page {
  display: none;
  max-width: 740px;
  margin: 0 auto;
  padding: 3rem 1.5rem;
  text-align: center;
  position: relative;
  z-index: 1;
}
.results-score-ring {
  width: 180px;
  height: 180px;
  margin: 0 auto 2rem;
  position: relative;
}
.results-score-ring svg { transform: rotate(-90deg); }
.ring-bg { stroke: var(--progress-track); }
.ring-fill {
  stroke: var(--accent);
  transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1);
}
.ring-fill.pass { stroke: var(--correct); }
.ring-fill.fail { stroke: var(--incorrect); }
.score-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}
.score-pct {
  font-family: var(--font-display);
  font-size: 2.5rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: -0.03em;
}
.score-label {
  font-size: 0.65rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
}
.results-stats {
  display: flex;
  justify-content: center;
  gap: 1rem;
  margin-bottom: 2.5rem;
  flex-wrap: wrap;
}
.stat-box {
  background: var(--stat-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius);
  padding: 1rem 1.5rem;
  min-width: 110px;
  box-shadow: var(--glass-inner);
}
.stat-val {
  font-family: var(--font-display);
  font-size: 1.5rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.stat-val.green { color: var(--correct); }
.stat-val.red { color: var(--incorrect); }
.stat-lbl {
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 0.2rem;
  font-weight: 600;
}
.pass-fail {
  font-size: 0.85rem;
  padding: 0.45rem 1.5rem;
  border-radius: 980px;
  display: inline-block;
  margin-bottom: 2rem;
  letter-spacing: 0.04em;
  font-weight: 700;
}
.pass-fail.pass {
  background: var(--correct-bg);
  color: var(--correct);
}
.pass-fail.fail {
  background: var(--incorrect-bg);
  color: var(--incorrect);
}
.btn-review, .btn-restart {
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  padding: 0.85rem 2rem;
  border: none;
  border-radius: 980px;
  cursor: pointer;
  transition: all 0.25s ease;
  margin: 0 0.35rem;
}
.btn-review {
  background: rgba(0,122,255,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 4px 16px var(--accent-glow), 0 1px 0 rgba(255,255,255,0.2) inset;
}
[data-theme="dark"] .btn-review {
  background: rgba(10,132,255,0.75);
  border-color: rgba(255,255,255,0.15);
}
.btn-review:hover {
  background: rgba(0,122,255,0.95);
  transform: scale(1.03);
  box-shadow: 0 6px 24px var(--accent-glow), 0 1px 0 rgba(255,255,255,0.2) inset;
}
.btn-restart {
  background: var(--stat-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  color: var(--text-secondary);
  border: 1px solid var(--glass-border);
  box-shadow: var(--glass-inner);
}
.btn-restart:hover {
  background: var(--bg-card-hover);
  color: var(--text-primary);
}

/* ── RESPONSIVE ── */
@media (max-width: 640px) {
  .intro-title { font-size: 1.8rem; }
  .exam-container, .results-page { padding: 1rem; }
  .question-card { padding: 1.15rem; }
  .block-narrative { padding: 1rem; }
  .results-stats { gap: 0.6rem; }
  .stat-box { min-width: 85px; padding: 0.75rem; }
  .theme-toggle-wrap { top: 0.75rem; right: 0.75rem; }
}
</style>
</head>
<body>

<div class="theme-toggle-wrap">
  <span class="theme-toggle-label" id="themeLabel">Dark</span>
  <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle dark mode"></button>
</div>

<div class="intro-page" id="introPage">

// ── STATE ──
let answers = {};
let totalQuestions = 0;

function getAllQuestions() {
  const qs = [];
  examData.scenarios.forEach(s => s.blocks.forEach(b => b.questions.forEach(q => qs.push(q))));
  return qs;
}

// ── START ──
function startExam() {
  document.getElementById('introPage').style.display = 'none';
  document.getElementById('examContainer').style.display = 'block';
  totalQuestions = getAllQuestions().length;
  renderExam();
}

// ── RENDER ──
function renderExam() {
  const c = document.getElementById('examContainer');
  let html = `<div class="progress-bar-wrap"><div class="progress-header"><span class="progress-label">Progress</span><span class="progress-count" id="progCount">0 / ${totalQuestions}</span></div><div class="progress-track"><div class="progress-fill" id="progFill"></div></div></div>`;

  examData.scenarios.forEach(scenario => {
    html += `<div class="scenario-header">Scenario ${scenario.id}</div>`;
    html += `<div class="scenario-title">${scenario.title}</div>`;

    scenario.blocks.forEach(block => {
      if (block.text) {
        html += `<div class="block-narrative">${block.text.replace(/\n/g, '<br><br>')}</div>`;
      }
      block.questions.forEach(q => {
        html += renderQuestion(q);
      });
    });
  });

  html += `<div style="text-align:center;padding:2rem 0"><button class="btn-start" id="btnSubmit" onclick="submitExam()" style="display:none">Submit Exam</button></div>`;
  c.innerHTML = html;
}

function renderQuestion(q) {
  let h = `<div class="question-card" id="qcard-${q.id}">`;
  h += `<div class="question-meta">`;
  h += `<span class="q-badge q-number">Q${q.id}</span>`;
  h += `<span class="q-badge q-type">${q.type}</span>`;
  h += `<span class="q-badge q-format">${q.format}</span>`;
  h += `</div>`;
  h += `<div class="question-stem">${q.stem}</div>`;

  if (q.format === 'combination' && q.subOptions) {
    h += `<div class="sub-options">`;
    q.subOptions.forEach(so => {
      h += `<div class="sub-option"><span>${so.num}.</span> ${so.text}</div>`;
    });
    h += `</div>`;
  }

  h += `<div class="options-list" id="opts-${q.id}">`;
  q.options.forEach(o => {
    h += `<button class="option-btn" id="opt-${q.id}-${o.letter}" onclick="selectAnswer(${q.id},'${o.letter}')">`;
    h += `<span class="option-letter">${o.letter}</span>`;
    h += `<span>${o.text}</span>`;
    h += `</button>`;
  });
  h += `</div>`;

  h += `<div class="rationale" id="rat-${q.id}"><div class="rationale-label">Rationale</div>${q.rationale}</div>`;
  h += `</div>`;
  return h;
}

// ── SELECT ──
function selectAnswer(qId, letter) {
  if (answers[qId]) return;
  answers[qId] = letter;

  const q = getAllQuestions().find(x => x.id === qId);
  const isCorrect = letter === q.correctAnswer;

  // Style selected
  const selBtn = document.getElementById(`opt-${qId}-${letter}`);
  selBtn.classList.add(isCorrect ? 'selected-correct' : 'selected-incorrect');

  // If wrong, show correct
  if (!isCorrect) {
    document.getElementById(`opt-${qId}-${q.correctAnswer}`).classList.add('show-correct');
  }

  // Disable all
  q.options.forEach(o => {
    document.getElementById(`opt-${qId}-${o.letter}`).classList.add('disabled');
  });

  // Show rationale
  document.getElementById(`rat-${qId}`).style.display = 'block';

  // Update progress
  updateProgress();
}

function updateProgress() {
  const answered = Object.keys(answers).length;
  document.getElementById('progCount').textContent = `${answered} / ${totalQuestions}`;
  document.getElementById('progFill').style.width = `${(answered / totalQuestions) * 100}%`;

  if (answered === totalQuestions) {
    document.getElementById('btnSubmit').style.display = 'inline-block';
  }
}

// ── SUBMIT ──
function submitExam() {
  const allQ = getAllQuestions();
  let correct = 0;
  allQ.forEach(q => { if (answers[q.id] === q.correctAnswer) correct++; });

  const pct = Math.round((correct / totalQuestions) * 100);
  const pass = pct >= 70;

  document.getElementById('examContainer').style.display = 'none';
  const rp = document.getElementById('resultsPage');
  rp.style.display = 'block';

  document.getElementById('scorePct').textContent = pct + '%';
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statIncorrect').textContent = totalQuestions - correct;
  document.getElementById('statTotal').textContent = totalQuestions;

  const pf = document.getElementById('passFail');
  pf.textContent = pass ? 'PASS' : 'FAIL';
  pf.className = 'pass-fail ' + (pass ? 'pass' : 'fail');

  const ring = document.getElementById('ringFill');
  ring.className = 'ring-fill ' + (pass ? 'pass' : 'fail');
  const circumference = 2 * Math.PI * 78;
  ring.style.strokeDasharray = circumference;
  setTimeout(() => {
    ring.style.strokeDashoffset = circumference - (circumference * pct / 100);
  }, 100);

  window.scrollTo(0, 0);
}

// ── REVIEW ──
function reviewExam() {
  document.getElementById('resultsPage').style.display = 'none';
  document.getElementById('examContainer').style.display = 'block';
  window.scrollTo(0, 0);
}

// ── RESTART ──
function restartExam() {
  answers = {};
  document.getElementById('resultsPage').style.display = 'none';
  document.getElementById('introPage').style.display = 'flex';
  window.scrollTo(0, 0);
}
</script>
